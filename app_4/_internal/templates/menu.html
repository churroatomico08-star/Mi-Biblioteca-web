<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Biblioteca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- CORRECCIÓN: Referencia al nuevo nombre del CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='atyle.css') }}">
</head>
<body>
    <div class="header-stats">
        <h1>📚 Mi Biblioteca</h1>
        <p>Disponibles: {{ disponibles }} | Prestados: {{ prestados }}</p>
    </div>

    <div class="container">
        <div class="login-box">
            <h2>Ingresar</h2>
            <form action="/login" method="POST">
                <div class="input-group"><i class="fas fa-user"></i> <input type="text" name="username" placeholder="Usuario" required></div>
                <div class="input-group"><i class="fas fa-lock"></i> <input type="password" name="password" placeholder="Clave" required></div>
                <button type="submit" class="login-btn">Entrar</button>
            </form>
        </div>

        <div class="login-box">
            <h2>Registrarse</h2>
            <form action="/registro" method="POST">
                <div class="input-group"><i class="fas fa-user-plus"></i> <input type="text" name="username" placeholder="Nuevo Usuario" required></div>
                <div class="input-group"><i class="fas fa-key"></i> <input type="password" name="password" placeholder="Clave" required></div>
                <div class="input-group">
                    <select name="rol">
                        <option value="user">Lector</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="login-btn" style="background: #28a745;">Crear</button>
            </form>
        </div>
    </div>
</body>
</html>
